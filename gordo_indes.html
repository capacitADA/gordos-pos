<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Firebase - Gordo's</title>
    <style>
        body {
            font-family: monospace;
            background: #111;
            color: #F5EDD6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #1A1A1A;
            border: 1px solid #D32B2B;
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            color: #D32B2B;
            margin-top: 0;
        }
        pre {
            background: #2E2E2E;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
        .success {
            color: #4CAF50;
            font-weight: bold;
        }
        .error {
            color: #ff6b6b;
            font-weight: bold;
        }
        button {
            background: #D32B2B;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
        button:hover {
            background: #A82222;
        }
        .log {
            margin-top: 15px;
            border-top: 1px solid #333;
            padding-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🔌 Prueba de conexión a Firebase</h1>
    <p><strong>Configuración utilizada:</strong></p>
    <pre id="configDisplay"></pre>
    <div id="status">⏳ Inicializando Firebase...</div>
    <button id="testBtn">Probar escritura en base de datos</button>
    <div class="log" id="log"></div>
</div>

<!-- SDKs de Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
    // ===== TU CONFIGURACIÓN EXACTA (sin cambios) =====
    const firebaseConfig = {
        apiKey: "AIzaSyDdoj6UZEBGetMNgfucn2kQsv12EtgEju4",
        authDomain: "gordos-burger-443fb.firebaseapp.com",
        databaseURL: "https://gordos-burger-443fb-default-rtdb.firebaseio.com", // SIN barra al final
        projectId: "gordos-burger-443fb",
        storageBucket: "gordos-burger-443fb.firebasestorage.app",
        messagingSenderId: "239611023125",
        appId: "1:239611023125:web:b41defcb1c47c8dba1a31c"
    };

    // Mostrar configuración (ocultando datos sensibles parcialmente)
    const displayConfig = { ...firebaseConfig };
    displayConfig.apiKey = displayConfig.apiKey.substring(0, 10) + "...";
    document.getElementById('configDisplay').innerText = JSON.stringify(displayConfig, null, 2);

    let app = null;
    let db = null;
    let initialized = false;

    function log(message, isError = false) {
        const logDiv = document.getElementById('log');
        const p = document.createElement('div');
        p.style.color = isError ? '#ff6b6b' : '#a3d96a';
        p.style.marginTop = '5px';
        p.innerText = new Date().toLocaleTimeString() + ' - ' + message;
        logDiv.appendChild(p);
        console.log(message);
    }

    try {
        // Inicializar Firebase
        if (!firebase.apps.length) {
            app = firebase.initializeApp(firebaseConfig);
            log('✅ Firebase inicializado correctamente');
        } else {
            app = firebase.app();
            log('⚠️ Firebase ya estaba inicializado');
        }

        db = firebase.database();
        initialized = true;
        document.getElementById('status').innerHTML = '<span class="success">✅ Firebase conectado (SDK cargado)</span>';
        
        // Probar conexión leyendo una referencia (sin escribir aún)
        const testRef = db.ref('.info/connected');
        testRef.on('value', (snap) => {
            if (snap.val() === true) {
                log('🔌 Conexión en tiempo real: CONECTADO a Realtime Database');
                document.getElementById('status').innerHTML = '<span class="success">✅ Conectado a la base de datos en la nube</span>';
            } else {
                log('⚠️ Conexión en tiempo real: DESCONECTADO', true);
                document.getElementById('status').innerHTML = '<span class="error">⚠️ Desconectado de Firebase, revisa tu red o reglas</span>';
            }
        });
        
    } catch (e) {
        log('❌ Error al inicializar Firebase: ' + e.message, true);
        document.getElementById('status').innerHTML = '<span class="error">❌ Error de inicialización: ' + e.message + '</span>';
        initialized = false;
    }

    // Botón de prueba de escritura
    document.getElementById('testBtn').addEventListener('click', () => {
        if (!initialized || !db) {
            log('Firebase no inicializado, no se puede escribir', true);
            return;
        }
        
        const testRef = db.ref('test_conexion/' + Date.now());
        const testData = {
            mensaje: "Conexión exitosa desde el POS de Gordo's",
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            origen: "web_test"
        };
        
        testRef.set(testData)
            .then(() => {
                log('🎉 ESCRITURA EXITOSA en la base de datos. Revisa tu consola de Firebase.', false);
                // Opcional: leer para confirmar
                testRef.once('value').then(snap => {
                    log('Datos escritos: ' + JSON.stringify(snap.val()));
                });
            })
            .catch((error) => {
                log('❌ Error de escritura: ' + error.message, true);
                if (error.message.includes('permission_denied')) {
                    log('👉 Las reglas de seguridad de la base de datos deniegan la escritura. Cambia las reglas a { ".read": true, ".write": true } temporalmente.', true);
                } else if (error.message.includes('Cannot parse')) {
                    log('👉 Revisa que databaseURL sea exactamente "https://gordos-burger-443fb-default-rtdb.firebaseio.com" sin espacios ni caracteres extra.', true);
                }
            });
    });
</script>
</body>
</html>
